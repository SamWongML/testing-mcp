# Local dev + integration-test dependencies (research §16, P6 store).
#
# Bring up Postgres, then point the store integration tests at it:
#
#   docker compose -f docker-compose.dev.yml up -d
#   ATP_TEST_DATABASE_URL=postgresql://atp:atp@localhost:5432/atp pnpm --filter @atp/store test
#
# When ATP_TEST_DATABASE_URL is unset the integration suites skip, so `pnpm test`
# stays green without a database. Artifacts use the LocalArtifactStore in dev; the S3
# path (and an optional MinIO service here) lands with the AWS wiring in P11.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: atp
      POSTGRES_PASSWORD: atp
      POSTGRES_DB: atp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atp -d atp"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - atp_pgdata:/var/lib/postgresql/data

volumes:
  atp_pgdata:
